<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHell | Volkan Yüksel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        
        <aside class="sidebar">
            
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-film"></i>
                    <span>MovieHell</span>
                </div>
                <button id="themeToggle" class="theme-btn" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
            
            <div class="filter-group">
                <h3 class="filter-main-title"><i class="fas fa-sliders-h"></i> Filter Options</h3>
                
                <div class="filter-section">
                    <h4 class="filter-subtitle">Category</h4>
                    <div class="segmented-control">
                        <label class="segment-label">
                            <input type="radio" name="typeFilter" value="" checked>
                            <span>All</span>
                        </label>
                        <label class="segment-label">
                            <input type="radio" name="typeFilter" value="movie">
                            <span>Movies</span>
                        </label>
                        <label class="segment-label">
                            <input type="radio" name="typeFilter" value="series">
                            <span>Series</span>
                        </label>
                    </div>
                </div>

                <div class="filter-section">
                    <h4 class="filter-subtitle">Genres</h4>
                    <div class="genre-list">
                        <label class="genre-chip"><input type="checkbox" value="Action"><span>Action</span></label>
                        <label class="genre-chip"><input type="checkbox" value="Comedy"><span>Comedy</span></label>
                        <label class="genre-chip"><input type="checkbox" value="Drama"><span>Drama</span></label>
                        <label class="genre-chip"><input type="checkbox" value="Sci-Fi"><span>Sci-Fi</span></label>
                        <label class="genre-chip"><input type="checkbox" value="Horror"><span>Horror</span></label>
                        <label class="genre-chip"><input type="checkbox" value="Romance"><span>Romance</span></label>
                    </div>
                </div>

                <div class="filter-section">
                    <h4 class="filter-subtitle">Release Year</h4>
                    <input type="number" id="yearFilter" class="year-input" placeholder="e.g. 2023">
                </div>

                 <div class="filter-section">
                    <h4 class="filter-subtitle">Min IMDb Rating</h4>
                    <div class="modern-rating-display">
                        <i class="fas fa-star"></i>
                        <span id="ratingDisplay">0</span><span class="rating-max">/ 10</span>
                    </div>
                    <input type="range" id="ratingFilter" min="0" max="10" step="1" value="0" class="modern-slider">
                </div>

                <div class="filter-section">
                    <h4 class="filter-subtitle">Sort By</h4>
                    <div class="segmented-control">
                        <label class="segment-label">
                            <input type="radio" name="sortFilter" value="newest" checked>
                            <span>Newest</span>
                        </label>
                        <label class="segment-label">
                            <input type="radio" name="sortFilter" value="oldest">
                            <span>Oldest</span>
                        </label>
                    </div>
                </div>

            </div>

            <button id="showFavorites" class="fav-btn">
                <i class="fas fa-heart"></i> My Watchlist (<span id="favCount">0</span>)
            </button>
        </aside>

        <main class="main-content">
            <header class="search-header">
                <div class="search-bar-wrapper" style="position: relative;">
                    <div class="search-bar" id="searchBarContainer">
                        <i class="fas fa-search" id="searchIcon"></i>
                        <input type="text" id="searchInput" placeholder="Search for movies, series..." autocomplete="off">
                        
                        <button id="magicSearchBtn" class="magic-btn">
                            <i class="fas fa-wand-magic-sparkles"></i>
                            <span class="modern-bubble">Ask AI for Recommendations</span>
                        </button>
                    </div>
                    <div id="searchSuggestions" class="search-suggestions hidden"></div>
                </div>
            </header>

            <section id="heroSection" class="hero-section hidden">
                <div id="heroBackdrop" class="hero-backdrop"></div>
                <div class="hero-overlay"></div>
                
                <div class="hero-content">
                    <div class="hero-info">
                        <div class="hero-badges">
                            <span id="heroYear" class="hero-badge">Year</span>
                            <span id="heroRating" class="hero-badge rating"><i class="fas fa-star"></i> <span>0.0</span></span>
                        </div>
                        <h2 id="heroTitle" class="hero-title">Movie Title</h2>
                        <p id="heroGenre" class="hero-genre">Action • Adventure</p>
                        <p id="heroPlot" class="hero-plot">Loading the plot...</p>
                        
                        <div class="hero-actions">
                            <button id="heroDetailBtn" class="btn-primary"><i class="fas fa-play"></i> View Details</button>
                            <button id="heroFavBtn" class="btn-secondary"><i class="fas fa-plus"></i> Watchlist</button>
                        </div>
                    </div>
                    
                    <div class="hero-poster-wrapper">
                        <img id="heroPoster" src="" alt="Movie Poster">
                    </div>
                </div>

                <button class="hero-arrow prev-arrow" id="heroPrev"><i class="fas fa-arrow-left-long"></i></button>
                <button class="hero-arrow next-arrow" id="heroNext"><i class="fas fa-arrow-right-long"></i></button>
                
                <div id="heroDots" class="hero-dots"></div>
            </section>

            <section id="resultsGrid" class="results-grid">
                <div class="empty-state">
                    <div class="empty-icon-wrapper">
                        <i class="fas fa-film"></i>
                    </div>
                    <h3>Welcome to MovieHell</h3>
                    <p>Discover your next favorite movie or TV series.</p>
                </div>
            </section>

            <div class="load-more-container hidden" id="loadMoreContainer">
                <button id="loadMoreBtn" class="load-more-btn">Load More</button>
            </div>
        </main>
    </div>

    <div id="movieModal" class="modal hidden">
        <div id="modalBackdrop" class="modal-backdrop"></div>
        <div class="modal-content glass-effect">
            <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
            <div id="modalBody"></div>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
